# SLF4J Simple Logger configuration
# https://www.slf4j.org/api/org/slf4j/simple/SimpleLogger.html

# Suppress PDFBox font fallback warnings (cosmetic — OrcPub writes PDFs, never renders to images).
# PDFBox logs WARN when Helvetica isn't found as a system font and falls back to bundled LiberationSans.
# Install fonts-liberation in the container to fix the root cause; this config is a safety net.
org.slf4j.simpleLogger.log.org.apache.pdfbox.pdmodel.font.PDType1Font=error
