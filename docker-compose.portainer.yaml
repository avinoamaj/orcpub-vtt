---
services:
  datomic:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: transactor
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DATOMIC_PASSWORD: ${DATOMIC_PASSWORD}
      ALT_HOST: ${ALT_HOST:-datomic}
      ENCRYPT_CHANNEL: ${ENCRYPT_CHANNEL:-true}
    volumes:
      - datomic_data:/data
      - datomic_logs:/log
      - datomic_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':10EE ' /proc/net/tcp || grep -q ':10EE ' /proc/net/tcp6"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 40s
    restart: unless-stopped

  orcpub:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: app
    depends_on:
      datomic:
        condition: service_healthy
    environment:
      PORT: ${PORT:-8890}
      DATOMIC_URL: ${DATOMIC_URL}
      SIGNATURE: ${SIGNATURE}
      CSP_POLICY: ${CSP_POLICY:-strict}
      DEV_MODE: ${DEV_MODE:-}
      LOAD_HOMEBREW_URL: ${LOAD_HOMEBREW_URL:-}
      EMAIL_SERVER_URL: ${EMAIL_SERVER_URL:-}
      EMAIL_ACCESS_KEY: ${EMAIL_ACCESS_KEY:-}
      EMAIL_SECRET_KEY: ${EMAIL_SECRET_KEY:-}
      EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT:-587}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-}
      EMAIL_ERRORS_TO: ${EMAIL_ERRORS_TO:-}
      EMAIL_SSL: ${EMAIL_SSL:-FALSE}
      EMAIL_TLS: ${EMAIL_TLS:-FALSE}
    ports:
      - "${PUBLIC_PORT:-8890}:${PORT:-8890}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:${PORT:-8890}/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

volumes:
  datomic_data:
  datomic_logs:
  datomic_backups:
